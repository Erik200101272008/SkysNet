// Reklám (minden film után)

  url: "https://vk.com/video_ext.php?oid=1037217102&id=456241239&hash=709d6b0c2411c5bd",
  duration: 6,
  title: "Reklám",
  rating: "12+"
};

// Véletlen sorrend létrehozása
function shuffle(array) {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
}

// Teljes ciklus létrehozása
let fullPlaylist = [];
const shuffledMovies = shuffle(playlist);
shuffledMovies.forEach(movie => {
  fullPlaylist.push(movie);
  fullPlaylist.push(ad);
});

let currentIndex = 0;
let progressInterval = null;
let videoStartTime = 0;

const player = document.getElementById("player");
const status = document.getElementById("status");
const ratingEl = document.getElementById("rating");
const progressBar = document.getElementById("progress-bar");

function formatTime(sec) {
  const h = Math.floor(sec / 3600).toString().padStart(2, '0');
  const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return h === "00" ? `${m}:${s}` : `${h}:${m}:${s}`;
}

function updateRating(rating) {
  if (!rating) rating = "16+";
  ratingEl.textContent = rating;
  ratingEl.style.background = rating.includes('18') ? 'rgba(220,20,60,0.95)' : 
                             rating.includes('16') ? 'rgba(255,140,0,0.95)' : 'rgba(255,215,0,0.9)';
}

function addAutoplayParam(url) {
  if (url.includes("archive.org")) {
    return url.includes("?") ? url + "&autoplay=1" : url + "?autoplay=1";
  }
  if (url.includes("vk.com")) {
    return url.includes("?") ? url + "&autoplay=1" : url + "?autoplay=1";
  }
  return url;
}

function startProgress(duration) {
  progressBar.style.width = "0%";
  clearInterval(progressInterval);
  const start = Date.now();
  progressInterval = setInterval(() => {
    const elapsed = (Date.now() - start) / 1000;
    let percent = (elapsed / duration) * 100;
    if (percent > 100) percent = 100;
    progressBar.style.width = percent + "%";
  }, 300);
}

function playNext() {
  const video = fullPlaylist[currentIndex];
  if (!video) {
    currentIndex = 0;
    playNext();
    return;
  }

  let src = addAutoplayParam(video.url);

  player.src = src;
  status.textContent = `${(currentIndex % 2 === 0 ? "🎬" : "📺")} ${video.title}`;
  
  updateRating(video.rating);

  videoStartTime = Date.now();
  startProgress(video.duration);

  setTimeout(() => {
    currentIndex = (currentIndex + 1) % fullPlaylist.length;
    playNext();
  }, (video.duration + 3) * 1000);
}

// Indítás
playNext();

// Autoplay támogatás
document.addEventListener("click", () => {
  if (player.paused) player.play();
}, { once: true });

// ====================== MŰSORÚJSÁG ======================
function getCurrentPosition() {
  const now = Date.now();
  let elapsed = (now - videoStartTime) / 1000;
  if (elapsed < 0) elapsed = 0;

  let sum = 0;
  for (let i = 0; i < fullPlaylist.length; i++) {
    const idx = (currentIndex + i) % fullPlaylist.length;
    const dur = fullPlaylist[idx].duration;
    if (sum + dur > elapsed) {
      return {
        index: idx,
        timeInto: elapsed - sum,
        timeLeft: dur - (elapsed - sum)
      };
    }
    sum += dur;
  }
  return { index: currentIndex, timeInto: 0, timeLeft: fullPlaylist[currentIndex].duration };
}

function updateGuide() {
  const pos = getCurrentPosition();
  const current = fullPlaylist[pos.index];

  document.getElementById("current-info").innerHTML = `
    <strong>Most megy:</strong> ${current.title} 
    <span class="countdown">• még ${formatTime(Math.round(pos.timeLeft))}</span>
  `;

  const tbody = document.getElementById("guide-tbody");
  tbody.innerHTML = "";

  for (let i = 0; i < Math.min(12, fullPlaylist.length); i++) {
    const itemIndex = (pos.index + i) % fullPlaylist.length;
    const item = fullPlaylist[itemIndex];
    const tr = document.createElement("tr");
    
    if (i === 0) tr.className = "now";
    else if (i === 1) tr.className = "next";

    tr.innerHTML = `
      <td>${(itemIndex + 1).toString().padStart(2,'0')}</td>
      <td>${item.title} ${i===0 ? '<span style="color:#4caf50;">● ÉLŐ</span>' : i===1 ? '<span class="countdown">(következő)</span>' : ''}</td>
      <td class="time">${formatTime(item.duration)}</td>
    `;
    tbody.appendChild(tr);
  }
}

// Guide vezérlés
const guideBtn = document.getElementById("guide-btn");
const guideOverlay = document.getElementById("guide-overlay");
const guideClose = document.getElementById("guide-close");

guideBtn.addEventListener("click", () => {
  updateGuide();
  guideOverlay.style.display = "flex";
});

guideClose.addEventListener("click", () => guideOverlay.style.display = "none");
guideOverlay.addEventListener("click", e => {
  if (e.target === guideOverlay) guideOverlay.style.display = "none";
});

setInterval(() => {
  if (guideOverlay.style.display === "flex") updateGuide();
}, 15000);
