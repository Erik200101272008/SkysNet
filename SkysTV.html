<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="shortcut icon" type="image/png" href="SkysTV.png">
  <title>SkysTV • 24/7</title>
  <style>
    body { margin:0; background:#000; overflow:hidden; font-family:Arial, sans-serif; color:#fff; }
    #container { position:relative; width:100vw; height:100vh; }

    #player { width:100%; height:100%; border:none; background:#000; }

    #overlay-bottom {
      position: absolute; bottom:12px; left:12px; right:12px;
      background:rgba(0,0,0,0.75); padding:12px 16px; border-radius:8px;
      display:flex; justify-content:space-between; align-items:center; font-size:1.1rem;
      z-index:10; pointer-events:none; box-shadow:0 4px 15px rgba(0,0,0,0.6);
    }
    #progress { flex:1; margin:0 20px; height:7px; background:#444; border-radius:4px; overflow:hidden; }
    #progress-bar { width:0%; height:100%; background:linear-gradient(90deg, #e53935, #ff9800); transition:width 0.3s linear; }

    #guide-btn {
      position: absolute; top: 16px; right: 16px;
      background: rgba(0,0,0,0.8); color: white; border: 2px solid #e53935;
      padding: 10px 18px; border-radius: 8px; cursor: pointer; z-index: 20;
      font-size: 1.05rem; font-weight: bold; pointer-events: auto;
    }
    #guide-btn:hover { background: #e53935; transform: scale(1.05); }

    #logo-overlay {
      position: absolute; top: 16px; left: 16px; z-index: 25; pointer-events: none;
      opacity: 0.9; transition: opacity 0.3s;
    }
    #logo-overlay:hover { opacity: 1; }
    #logo-overlay img { height: 90px; width: auto; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.8)); }

    #guide-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 30;
      display: none; align-items: center; justify-content: center;
    }
    #guide-content {
      background: #111; border: 2px solid #e53935; border-radius: 12px;
      padding: 25px; max-width: 95%; width: 920px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 10px 40px rgba(229,57,53,0.4);
    }
    #guide-close { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; cursor: pointer; color: #aaa; }
    #guide-close:hover { color: #fff; }
    #guide-title { text-align: center; color: #e53935; margin: 0 0 20px 0; font-size: 2rem; }

    table { width:100%; border-collapse: collapse; }
    th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #e53935; color: white; }
    tr.now { background: #1b5e20 !important; font-weight: bold; }
    tr.next { background: #37474f; }
    .countdown { color: #ffcc80; font-style: italic; }
    .time { font-family: Consolas, monospace; color: #8bc34a; }

    .ticker {
      position: absolute; top: 0; left: 0; right: 0;
      background: rgba(229,57,53,0.9); padding: 6px 0; text-align: center;
      font-size: 0.95rem; white-space: nowrap; overflow: hidden;
      z-index: 15;
    }
    .ticker-content {
      display: inline-block;
      padding-left: 100%;
      animation: ticker 35s linear infinite;
    }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
  </style>
</head>
<body>

      <table>
        <thead><tr><th>#</th><th>Cím</th><th>Hossz</th></tr></thead>

// Reklám (minden film után)
const ad = {
  url: "https://vk.com/video_ext.php?oid=1037217102&id=456241239&hash=709d6b0c2411c5bd",
  duration: 6,
  title: "Reklám"
};

// Véletlen sorrend létrehozása
function shuffle(array) {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
}

// Teljes ciklus létrehozása véletlen sorrendben
let fullPlaylist = [];
const shuffledMovies = shuffle(playlist);
shuffledMovies.forEach(movie => {
  fullPlaylist.push(movie);
  fullPlaylist.push(ad);
});

let currentIndex = 0;
let progressInterval = null;
let videoStartTime = 0;

const player = document.getElementById("player");
const status = document.getElementById("status");
const clockEl = document.getElementById("clock");
const progressBar = document.getElementById("progress-bar");

function formatTime(sec) {
  const h = Math.floor(sec / 3600).toString().padStart(2, '0');
  const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return h === "00" ? `${m}:${s}` : `${h}:${m}:${s}`;
}

function updateClock() {
  clockEl.textContent = new Date().toLocaleTimeString("hu-HU", {hour:"2-digit", minute:"2-digit"});
}
setInterval(updateClock, 10000);
updateClock();

function addAutoplayParam(url) {
  if (url.includes("archive.org")) {
    return url.includes("?") ? url + "&autoplay=1" : url + "?autoplay=1";
  }
  if (url.includes("vk.com")) {
    return url.includes("?") ? url + "&autoplay=1" : url + "?autoplay=1";
  }
  return url;
}

function startProgress(duration) {
  progressBar.style.width = "0%";
  clearInterval(progressInterval);
  const start = Date.now();
  progressInterval = setInterval(() => {
    const elapsed = (Date.now() - start) / 1000;
    let percent = (elapsed / duration) * 100;
    if (percent > 100) percent = 100;
    progressBar.style.width = percent + "%";
  }, 300);
}

function playNext() {
  const video = fullPlaylist[currentIndex];
  if (!video) {
    currentIndex = 0;
    playNext();
    return;
  }

  let src = addAutoplayParam(video.url);

  player.src = src;
  status.textContent = `${(currentIndex % 2 === 0 ? "🎬" : "📺")} ${video.title}`;

  videoStartTime = Date.now();
  startProgress(video.duration);

  // Következő videó
  setTimeout(() => {
    currentIndex = (currentIndex + 1) % fullPlaylist.length;
    playNext();
  }, (video.duration + 3) * 1000);
}

// Indítás
playNext();

// Autoplay támogatás mobilra
document.addEventListener("click", () => {
  if (player.paused) player.play();
}, { once: true });

// ====================== MŰSORÚJSÁG ======================
function getCurrentPosition() {
  const now = Date.now();
  let elapsed = (now - videoStartTime) / 1000;
  if (elapsed < 0) elapsed = 0;

  let sum = 0;
  for (let i = 0; i < fullPlaylist.length; i++) {
    const idx = (currentIndex + i) % fullPlaylist.length;
    const dur = fullPlaylist[idx].duration;
    if (sum + dur > elapsed) {
      return {
        index: idx,
        timeInto: elapsed - sum,
        timeLeft: dur - (elapsed - sum)
      };
    }
    sum += dur;
  }
  return { index: currentIndex, timeInto: 0, timeLeft: fullPlaylist[currentIndex].duration };
}

function updateGuide() {
  const pos = getCurrentPosition();
  const current = fullPlaylist[pos.index];

  document.getElementById("current-info").innerHTML = `
    <strong>Most megy:</strong> ${current.title} 
    <span class="countdown">• még ${formatTime(Math.round(pos.timeLeft))}</span>
  `;

  const tbody = document.getElementById("guide-tbody");
  tbody.innerHTML = "";

  for (let i = 0; i < Math.min(12, fullPlaylist.length); i++) {
    const itemIndex = (pos.index + i) % fullPlaylist.length;
    const item = fullPlaylist[itemIndex];
    const tr = document.createElement("tr");
    
    if (i === 0) tr.className = "now";
    else if (i === 1) tr.className = "next";

    tr.innerHTML = `
      <td>${(itemIndex + 1).toString().padStart(2,'0')}</td>
      <td>${item.title} ${i===0 ? '<span style="color:#4caf50;">● ÉLŐ</span>' : i===1 ? '<span class="countdown">(következő)</span>' : ''}</td>
      <td class="time">${formatTime(item.duration)}</td>
    `;
    tbody.appendChild(tr);
  }
}

// Guide vezérlés
const guideBtn = document.getElementById("guide-btn");
const guideOverlay = document.getElementById("guide-overlay");
const guideClose = document.getElementById("guide-close");

guideBtn.addEventListener("click", () => {
  updateGuide();
  guideOverlay.style.display = "flex";
});

guideClose.addEventListener("click", () => guideOverlay.style.display = "none");
guideOverlay.addEventListener("click", e => {
  if (e.target === guideOverlay) guideOverlay.style.display = "none";
});

setInterval(() => {
  if (guideOverlay.style.display === "flex") updateGuide();
}, 15000);
</script>
