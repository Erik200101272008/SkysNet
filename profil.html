<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/png" href="skysnet.png">
  <title>SkysNet - Ki nézi?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #141414;
      color: white;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo {
      position: absolute;
      top: 40px;
      left: 50px;
      font-size: 2.8rem;
      font-weight: bold;
      color: #e50914;
    }
    .container { text-align: center; }
    h1 {
      font-size: 3.8rem;
      margin-bottom: 60px;
      font-weight: 400;
    }
    .profiles {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .profile {
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .profile:hover {
      transform: scale(1.12);
    }
    .avatar {
      width: 170px;
      height: 170px;
      border-radius: 12px;
      overflow: hidden;
      border: 4px solid transparent;
      transition: all 0.3s;
    }
    .profile:hover .avatar {
      border-color: white;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .name {
      margin-top: 15px;
      font-size: 1.5rem;
      color: #b3b3b3;
    }
    .profile:hover .name {
      color: white;
    }
  </style>
</head>
<body>
  <div class="logo">SKYSNET</div>
  <div class="container">
    <h1>Ki nézi?</h1>
   
    <div class="profiles" id="profilesContainer"></div>
  </div>

  <script>
    const profiles = [
      { name: "Erik",  pin: "2001", image: "https://cdn.mos.cms.futurecdn.net/hNA4VHWb4njAtxk9mVDQvV.jpg" },
      { name: "Cinti", pin: "1998", image: "https://i.pinimg.com/736x/ee/ec/fd/eeecfd39ea632418aab3fc0485c3c0c1.jpg" },
      { name: "Bandi", pin: "2000", image: "https://i.pinimg.com/736x/5c/63/16/5c6316ea9b1c8ff875ee65daa8c77cd4.jpg" },
      { name: "Magdi",  pin: "1974", image: "https://i.pinimg.com/1200x/fe/31/f7/fe31f7e86ca12d48084de16c6c1d48de.jpg" },
      { name: "Attila", pin: "1971", image: "https://i.pinimg.com/1200x/f4/5e/5d/f45e5dd8e0bf3f5e23036f066c8b74a8.jpg" }
    ];

    const container = document.getElementById('profilesContainer');

    profiles.forEach(p => {
      const div = document.createElement('div');
      div.className = 'profile';
      div.innerHTML = `
        <div class="avatar">
          <img src="${p.image}" alt="${p.name}">
        </div>
        <div class="name">${p.name}</div>
      `;
      div.onclick = () => checkPin(p.name, p.pin);
      container.appendChild(div);
    });

    function checkPin(name, correctPin) {
      const enteredPin = prompt(`Írd be ${name} 4 számjegyű PIN kódját:`);
      if (enteredPin === null) return;
      
      if (enteredPin === correctPin) {
        window.location.href = `szemszab.html?profile=${encodeURIComponent(name)}`;
      } else {
        alert("❌ Hibás PIN kód!");
      }
    }
  </script>
</body>
</html>
