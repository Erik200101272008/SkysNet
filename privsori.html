    body { 
        font-family: 'Inter', sans-serif; 
        background: #141414; 
        color: #fff; 
    }
    
    .movie-row { margin-bottom: 50px; }
    .row-title { font-size: 1.5rem; font-weight: 600; margin: 0 0 15px 20px; }
    
    /* Normál méret (Népszerű tartalmak) */
    .movie-card {
        position: relative;
        transition: all 0.4s ease;
        cursor: pointer;
        width: 100%;
        max-width: 180px;
    }
    .movie-card:hover { transform: scale(1.12); z-index: 20; }
    .movie-card img { 
        border-radius: 8px; 
        width: 100%;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        transition: all 0.4s;
    }

    /* Kisebb méret a Continue és My List sorokhoz */
    .small-card {
        max-width: 140px;
    }
    .small-card img {
        aspect-ratio: 2 / 3;
    }

    .movie-info {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: linear-gradient(transparent, rgba(0,0,0,0.95));
        padding: 16px 10px 10px;
        opacity: 0;
        transition: opacity 0.3s;
        border-radius: 0 0 8px 8px;
        font-size: 0.95rem;
    }
    .movie-card:hover .movie-info { opacity: 1; }
    
    .btn { padding: 5px 12px; border-radius: 4px; font-size: 0.85rem; }
    .btn-play { background: #e50914; }
    .btn-list { background: rgba(255,255,255,0.2); }

        let currentProfile = "Erik";

        function getProfileFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const profile = params.get('profile');
            if (profile && profiles[profile]) currentProfile = profile;
        }

        function toggleProfileMenu() {
            let options = Object.keys(profiles).join("\n");
            const selected = prompt(`Válassz profilt:\n\n${options}`, currentProfile);
            if (selected && profiles[selected]) {
                currentProfile = selected;
                document.getElementById("currentProfile").textContent = selected;
                document.getElementById("profilePic").src = profiles[selected];
                renderRows();
            }
        }
		
		function createMovieCard(movie, isSmall = false) {
    const div = document.createElement('div');
    div.className = `movie-card group ${isSmall ? 'small-card' : ''}`;
    div.innerHTML = `
        <div class="relative overflow-hidden rounded-xl">
            <img src="${movie.image}" class="w-full">
            <div class="movie-info">
                <h3 class="font-semibold">${movie.title}</h3>
                <div class="flex gap-2 mt-3">
                    <button onclick="playMovie('${movie.title}')" class="btn btn-play text-xs flex-1">
                        ▶ Lejátszás
                    </button>
                    <button onclick="toggleMyList(this, '${movie.title}')" class="btn btn-list text-xs">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>
        </div>
    `;
    return div;
}

function renderRows() {
    // Continue Watching - KISEBB
    const contRow = document.getElementById('continue-row');
    contRow.innerHTML = getContinueWatching().map(m => createMovieCard(m, true).outerHTML).join('');

    // My List - KISEBB
    const listRow = document.getElementById('mylist-row');
    listRow.innerHTML = getMyList().map(m => createMovieCard(m, true).outerHTML).join('');

    // Népszerű tartalmak - Normál méret
    const allRow = document.getElementById('movie-list');
    allRow.innerHTML = movies.map(m => createMovieCard(m, false).outerHTML).join('');
}

        // Profil-specifikus mentés
        function getKey(type) {
            return `skysnet_${type}_${currentProfile}`;
        }

        function getMyList() { return JSON.parse(localStorage.getItem(getKey('mylist')) || '[]'); }
        function getContinueWatching() { return JSON.parse(localStorage.getItem(getKey('continue')) || '[]'); }
        function saveMyList(list) { localStorage.setItem(getKey('mylist'), JSON.stringify(list)); }
        function saveContinueWatching(list) { localStorage.setItem(getKey('continue'), JSON.stringify(list)); }

        function createMovieCard(movie) {
            const div = document.createElement('div');
            div.className = "movie-card group";
            div.innerHTML = `
                <div class="relative overflow-hidden rounded-xl">
                    <img src="${movie.image}" class="w-full aspect-[2/3] object-cover">
                    <div class="movie-info">
                        <h3 class="font-semibold">${movie.title}</h3>
                        <div class="flex gap-2 mt-3">
                            <button onclick="playMovie('${movie.title}')" class="btn btn-play text-xs flex-1">
                                ▶ Lejátszás
                            </button>
                            <button onclick="toggleMyList(this, '${movie.title}')" class="btn btn-list text-xs">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        function playMovie(title) {
            const movie = movies.find(m => m.title === title);
            if (movie?.link) {
                window.open(movie.link, '_blank');
                
                let cont = getContinueWatching();
                cont = cont.filter(m => m.title !== title);
                cont.unshift(movie);
                if (cont.length > 10) cont.pop();
                saveContinueWatching(cont);
                renderRows();
            }
        }

        function toggleMyList(btn, title) {
            let list = getMyList();
            if (list.find(m => m.title === title)) {
                list = list.filter(m => m.title !== title);
                btn.innerHTML = `<i class="fas fa-plus"></i>`;
            } else {
                const movie = movies.find(m => m.title === title);
                if (movie) list.push(movie);
                btn.innerHTML = `<i class="fas fa-check"></i>`;
            }
            saveMyList(list);
            renderRows();
        }

        function renderRows() {
            document.getElementById('continue-row').innerHTML = getContinueWatching().map(m => createMovieCard(m).outerHTML).join('');
            document.getElementById('mylist-row').innerHTML = getMyList().map(m => createMovieCard(m).outerHTML).join('');
            document.getElementById('movie-list').innerHTML = movies.map(m => createMovieCard(m).outerHTML).join('');
        }

        function filmKereses() {
            const term = document.getElementById('kereso').value.toLowerCase();
            const container = document.getElementById('movie-list');
            container.innerHTML = movies
                .filter(m => m.title.toLowerCase().includes(term))
                .map(m => createMovieCard(m).outerHTML)
                .join('');
        }

        window.onload = () => {
            getProfileFromUrl();
            document.getElementById("currentProfile").textContent = currentProfile;
            document.getElementById("profilePic").src = profiles[currentProfile];
            renderRows();
        };
    </script>
